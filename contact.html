 <main>
 	<section class="mainContainer">

        <section class="col-lg-4">
            <h1>Contact Me</h1>
            <p>Want to work together? Have a quick question? Fill out the form to reach me by email.</p>
            <p class="small whisper">Form powered by <a href="https://formsubmit.co/">FormSubmit</a>.</p>
        </section>
        <section class="col-lg-8">
            <form action="https://formsubmit.co/44636c5f086fda5fa99a37ad5acbdd3c" method="POST">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" name="name" placeholder="Your name" class="form-control" required>

                <label for="yourEmail" class="form-label">Email Address</label>
                <input type="email" id="yourEmail" name="email" placeholder="Your email address" class="form-control" required>

                <label for="emailBody" class="form-label">Message</label>
                <textarea id="emailBody" name="message" placeholder="Write your message here." class="form-control" required></textarea>

                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </section>

    </section>
