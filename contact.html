 <header>
    <nav class="navbar navbar-expand-lg">

 </header>



<!-- MAIN CONTENT -->
 <main>
 	<section class="mainContainer">
        <div class="row">
        <section class="col-lg-4">
            <h1>Contact Me</h1>
            <p>Want to work together or just ask a question? Fill out the form below to reach me by email.</p>
        </section>
        <section class="col-lg-8">
            <form>
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" name="name" placeholder="Your name" class="form-control">

                <label for="yourEmail" class="form-label">Your Email</label>
                <input type="email" id="yourEmail" name="email" placeholder="Your email address" class="form-control">

                <label for="subject" class="form-label">Subject</label>
                <input type="text" id="subject" name="subject" placeholder="Email subject" class="form-control">

                <label for="emailBody" class="form-label">Your Message</label>
                <textarea id="emailBody" name="message" placeholder="Write your message here..." class="form-control"></textarea>

                <button type="submit" class="btn btn-primary">Submit</button>
            </form>
        </section>
        </div>
    </section>
 </main>
